appId: com.maydaystudio.cloud
productName: Mayday Cloud
directories:
  output: dist

files:
  - src/**/*
  - node_modules/**/*
  - "!node_modules/sql.js/dist/sql-wasm-debug.wasm"

extraResources:
  - from: node_modules/sql.js/dist/sql-wasm.wasm
    to: sql-wasm.wasm

mac:
  category: public.app-category.utilities
  icon: assets/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: assets/icon.png
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: trevor-may
  repo: mayday-cloud
