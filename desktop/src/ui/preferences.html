<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mayday Cloud Preferences</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="setup-container">
    <div class="logo-section">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
        </svg>
      </div>
      <div class="logo-text">Preferences</div>
      <div class="tagline">Manage sync folder selections</div>
    </div>

    <div class="step active">
      <div class="step-title">Cloud folders to sync</div>
      <div class="step-desc">Changes take effect immediately. Local files from deselected folders remain on disk but stop syncing.</div>

      <label class="checkbox-row">
        <input type="checkbox" id="sync-all-check">
        <span>Sync everything</span>
      </label>

      <div id="folder-tree-container" class="folder-tree-container">
        <div id="folder-tree" class="folder-tree">
          <div class="folder-tree-loading">Loading folders...</div>
        </div>
      </div>

      <button class="btn" id="save-btn">Save</button>
      <div id="save-status" class="error-msg" style="display:none"></div>

      <!-- Virtual Drive Mount Settings -->
      <div style="margin-top:20px">
        <div class="section-divider"></div>
        <div class="step-title">Virtual Drive</div>
        <div class="step-desc">Mount your cloud storage as a local drive for Premiere Pro and other apps.</div>

        <div id="mount-deps-info" style="margin-bottom:10px"></div>

        <div class="form-group" style="gap:8px">
          <label style="font-size:12px;color:rgba(255,255,255,0.5)">Mount point</label>
          <div class="folder-picker">
            <input type="text" id="mount-point-input" placeholder="/Volumes/Mayday Cloud">
            <button class="btn btn-secondary" id="mount-pick-btn" style="width:auto;padding:8px 12px;font-size:12px">Browse</button>
          </div>

          <label style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:6px">Cache size</label>
          <select id="mount-cache-select" style="width:100%;padding:8px 12px;border:1px solid rgba(255,255,255,0.12);border-radius:8px;background:rgba(255,255,255,0.04);color:#e2e8f0;font-size:14px;font-family:inherit;-webkit-app-region:no-drag">
            <option value="10G">10 GB</option>
            <option value="25G">25 GB</option>
            <option value="50G" selected>50 GB</option>
            <option value="100G">100 GB</option>
            <option value="200G">200 GB</option>
          </select>

          <label class="checkbox-row" style="margin-top:6px">
            <input type="checkbox" id="mount-autostart-check">
            <span>Auto-mount on launch</span>
          </label>

          <button class="btn" id="mount-save-btn" style="margin-top:8px">Save Mount Settings</button>
          <div id="mount-save-status" class="error-msg" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="preferences.js"></script>
</body>
</html>
