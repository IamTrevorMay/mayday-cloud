name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Import code signing certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Build, sign, notarize, and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: npm run release

      - name: Publish draft release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          # electron-builder creates duplicate draft releases (one per parallel upload).
          # Find the one with the most assets (the DMG), publish it, and delete the rest.
          DRAFTS=$(gh api repos/${{ github.repository }}/releases \
            --jq "[.[] | select(.draft==true and .tag_name==\"v${VERSION}\")] | sort_by(.assets | length) | reverse | .[].id")
          PRIMARY=$(echo "$DRAFTS" | head -1)
          if [ -n "$PRIMARY" ]; then
            # Retag to match our desktop-v* convention and publish
            gh api repos/${{ github.repository }}/releases/$PRIMARY \
              --method PATCH \
              --field tag_name="desktop-v${VERSION}" \
              --field draft=false
            echo "Published release desktop-v${VERSION}"
            # Delete duplicate drafts and orphan tag
            echo "$DRAFTS" | tail -n +2 | while read id; do
              [ -n "$id" ] && gh api repos/${{ github.repository }}/releases/$id --method DELETE
            done
            gh api repos/${{ github.repository }}/git/refs/tags/v${VERSION} --method DELETE 2>/dev/null || true
          else
            echo "No draft release found for v${VERSION}"
            exit 1
          fi
