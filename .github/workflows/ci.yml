name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-build:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  api-tests:
    name: API syntax + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: node --check src/server.js
      - run: node --check src/middleware/auth.js
      - run: node --check src/routes/auth.js
      - run: node --check src/routes/nas.js
      - run: node --check src/routes/shares.js
      - run: node --check src/routes/keys.js
      - run: node --check src/routes/drop.js
      - run: npx vitest run

  client-tests:
    name: Client unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx vitest run
