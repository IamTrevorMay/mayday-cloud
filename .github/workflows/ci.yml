name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-build:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  api-tests:
    name: API syntax + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: node --check src/server.js
      - run: node --check src/middleware/auth.js
      - run: node --check src/routes/auth.js
      - run: node --check src/routes/nas.js
      - run: node --check src/routes/shares.js
      - run: node --check src/routes/keys.js
      - run: node --check src/routes/drop.js
      - run: npx vitest run

  client-tests:
    name: Client unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx vitest run

  e2e-tests:
    name: Playwright e2e (slow lane)
    runs-on: ubuntu-latest
    needs: [web-build]
    continue-on-error: true
    defaults:
      run:
        working-directory: web
    env:
      REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
      REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
      REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/test-results/
          retention-days: 7
